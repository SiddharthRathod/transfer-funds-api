services:

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: paysera_php
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: paysera_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  mysql:
    image: mysql:8.4
    container_name: paysera_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: paysera
      MYSQL_USER: paysera
      MYSQL_PASSWORD: paysera
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    container_name: paysera_redis
    ports:
      - "6379:6379"

  adminer:
    image: adminer
    container_name: paysera_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mysql